[log_control]
enabled = true

[loggers]
keys = root

[handlers]
keys = consoleHandler,fileHandler

[formatters]
keys = standardFormatter

[logger_root]
level = INFO
handlers = consoleHandler,fileHandler

[handler_consoleHandler]
class = StreamHandler
level = INFO
formatter = standardFormatter
args = (sys.stdout,)

[handler_fileHandler]
class = TrimAwareFileHandler
level = INFO
formatter = standardFormatter
args = ('%(project_root)s/application.log', 'a', 'utf-8')

[formatter_standardFormatter]
format = %(asctime)s - %(levelname)s - %(name)s - [%(filename)s:%(module)s:%(lineno)d] - %(message)s
datefmt = %Y-%m-%d %H:%M:%S

[debug]
enabled = false
level = DEBUG

[log_rotation]
enabled = true
max_size_kb = 200
retention_hours = 24
min_size_after_cleanup_kb = 100
temp_file = %(project_root)s/application.log.tmp
# Watcher checks the live-log size at most this often (seconds).
log_check_interval_sec = 5
